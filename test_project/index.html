<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — TaskApp</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">TaskApp</a>
    <div class="navbar-right">
      <span id="welcome-msg">Welcome, Guest</span>
      <button id="logout-btn" class="btn btn-ghost btn-sm">Log out</button>
    </div>
  </nav>

  <!-- Main content -->
  <div class="container">
    <h2 class="page-title">My Tasks</h2>
    <p class="page-subtitle">Keep track of everything you need to do.</p>

    <!-- Add task -->
    <div class="task-input-row">
      <input
        type="text"
        id="new-task-input"
        placeholder="Add a new task…"
        autocomplete="off"
      />
      <button id="add-task-btn" class="btn btn-primary" style="width:auto">
        + Add
      </button>
    </div>

    <!-- Task counter -->
    <p id="task-count">0 tasks pending</p>

    <!-- Empty state -->
    <p id="empty-msg" class="visible">No tasks yet. Add one above!</p>

    <!-- Task list -->
    <ul id="task-list" aria-label="Task list"></ul>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
